post:
  description: Reactivates a user membership for a specific tenant (sets status to active) - Super Admin
  operationId: reactivateUserFromSuperAdmin
  parameters:
    - name: tenantid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: userid
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: User reactivated
    "401":
      description: Unauthorized
    "403":
      description: Forbidden
    "404":
      description: User not found
    "500":
      description: Internal server error
