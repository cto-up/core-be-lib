delete:
  description: Permanently deletes a user from all tenants, the database, and the identity provider. SUPER_ADMIN only. This action is irreversible.
  operationId: hardDeleteUserFromSuperAdmin
  parameters:
    - name: userid
      in: path
      description: ID of user to permanently delete
      required: true
      schema:
        type: string
    - name: tenantid
      in: path
      description: ID of tenant context
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "204":
      description: User permanently deleted
    "401":
      description: Unauthorized
    "403":
      description: Forbidden — requires SUPER_ADMIN role or caller attempted to delete themselves
    "404":
      description: User not found
    "409":
      description: Conflict — user has active memberships in other tenants, deactivate those first
    "500":
      description: Internal server error
