get:
  description: Returns the per-user feature licenses (seats) for a user. On a tenant subdomain the caller's tenant is used; super admins / resellers on the root domain pass tenant_id.
  operationId: getUserFeatureLicenses
  parameters:
    - name: userid
      in: path
      description: ID of user to fetch
      required: true
      schema:
        type: string
    - name: tenant_id
      in: query
      description: Target tenant (UUID). Required only when there is no tenant subdomain context (root/super-admin); the caller must be allowed to manage that tenant.
      required: false
      schema:
        type: string
        format: uuid
  responses:
    "200":
      description: user feature licenses response
      content:
        application/json:
          schema:
            $ref: "../../core-schema.yaml#/components/schemas/TenantFeatureLicenses"
put:
  description: Updates the per-user feature licenses (seats) for a user. Only features enabled for the tenant may be assigned. On a tenant subdomain the caller's tenant is used; super admins / resellers on the root domain pass tenant_id.
  operationId: UpdateUserFeatureLicenses
  parameters:
    - name: userid
      in: path
      description: ID of user to update
      required: true
      schema:
        type: string
    - name: tenant_id
      in: query
      description: Target tenant (UUID). Required only when there is no tenant subdomain context (root/super-admin); the caller must be allowed to manage that tenant.
      required: false
      schema:
        type: string
        format: uuid
  requestBody:
    description: Feature licenses to set on the user
    required: true
    content:
      application/json:
        schema:
          $ref: "../../core-schema.yaml#/components/schemas/TenantFeatureLicenses"
  responses:
    "204":
      description: user feature licenses updated
