get:
  description: Returns feature licenses for a tenant.
  operationId: getTenantFeatureLicenses
  parameters:
    - name: tenantid
      in: path
      description: ID of tenant to fetch
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "200":
      description: tenant feature licenses response
      content:
        application/json:
          schema:
            $ref: "../../core-schema.yaml#/components/schemas/TenantFeatureLicenses"
put:
  description: Updates feature licenses for a tenant. Only enabled features may have a license.
  operationId: UpdateTenantFeatureLicenses
  parameters:
    - name: tenantid
      in: path
      description: ID of tenant to update
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    description: Feature licenses to set
    required: true
    content:
      application/json:
        schema:
          $ref: "../../core-schema.yaml#/components/schemas/TenantFeatureLicenses"
  responses:
    "204":
      description: feature licenses updated
