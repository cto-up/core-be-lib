type: object
required:
  - name
properties:
  name:
    type: string
  title:
    type: string
  about:
    type: string
  pictureURL:
    type: string
  backgroundPictureURL:
    type: string
  socialMedias:
    type: array
    items:
      type: string
  interests:
    type: array
    items:
      type: string
  skills:
    type: array
    items:
      type: string
  phoneNumber:
    type: string
  function:
    type: string
  company:
    type: string
  is_reseller:
    type: boolean
    description: Whether the current tenant is a reseller (read-only, derived from auth claims)
  is_acting_reseller:
    type: boolean
    description: Whether the current tenant is a reseller of a the tenant (read-only, derived from auth claims)
