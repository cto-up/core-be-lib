type: object
required:
  - name
  - subdomain
  - enable_email_link_sign_in
  - allow_password_sign_up
  - allow_sign_up
properties:
  name:
    type: string
  subdomain:
    type: string
  enable_email_link_sign_in:
    type: boolean
    description: Auth Provider setting to Enable email link sign in (TODO is really used?)
  allow_password_sign_up:
    type: boolean
    description: Auth Provider setting to Allow password sign up (can skip)
  allow_sign_up:
    type: boolean
    description: Allow users to sign up for this tenant
  is_reseller:
    type: boolean
  reseller_id:
    type: string
    nullable: true
  contract_end_date:
    type: string
    format: date-time
    nullable: true
    description: Optional contract expiry date. When reached, the tenant is automatically disabled.
  is_disabled:
    type: boolean
    description: When true, all API requests for this tenant are rejected with 403.
